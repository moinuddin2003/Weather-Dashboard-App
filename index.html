<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard App</title>

    <script src="./config.js" defer></script>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
            },
            colors: {
              dark: {
                bg: "#1a1b3a",
                card: "#252650",
                card2: "#1e1f42",
                border: "#2e2f5e",
                muted: "#8b8db8",
              },
            },
            boxShadow: {
              card: "0 4px 24px 0 rgba(0,0,0,0.25)",
              glow: "0 0 24px 0 rgba(99,102,241,0.15)",
            },
          },
        },
      };
    </script>
  </head>
  <body
    id="appBody"
    class="dark bg-slate-50 dark:bg-dark-bg min-h-screen text-slate-900 dark:text-white overflow-x-hidden transition-colors duration-300"
  >
    <div
      id="dashboard"
      class="flex flex-col lg:flex-row min-h-screen bg-slate-50 dark:bg-dark-bg transition-colors duration-300"
    >
      <div class="flex-1 flex flex-col xl:flex-row min-w-0">
        <div class="flex-1 flex flex-col p-4 md:p-6 gap-6 min-w-0">
          <div class="flex items-start justify-between flex-wrap gap-4">
            <div>
              <p
                id="currentTime"
                class="font-display text-4xl md:text-5xl font-bold text-slate-800 dark:text-white transition-colors"
              >
                <span
                  class="inline-block bg-slate-300 dark:bg-slate-700 h-10 w-44 rounded animate-pulse"
                ></span>
              </p>
              <p
                id="currentDate"
                class="text-slate-500 dark:text-dark-muted text-sm mt-1 transition-colors"
              >
                <span
                  class="inline-block bg-slate-300 dark:bg-slate-700 h-4 w-32 rounded animate-pulse"
                ></span>
              </p>
              <p
                id="greeting"
                class="text-slate-800 dark:text-white text-lg md:text-xl font-semibold mt-3 flex items-center gap-2 transition-colors"
              >
                <span
                  class="inline-block bg-slate-300 dark:bg-slate-700 h-6 w-48 rounded animate-pulse"
                ></span>
              </p>
            </div>

            <div
              class="flex items-center gap-1 bg-slate-200 dark:bg-dark-card border border-slate-300 dark:border-dark-border rounded-full p-1 shadow-md transition-colors duration-300"
            >
              <button
                id="lightBtn"
                class="w-8 h-8 rounded-full flex items-center justify-center text-sm transition-all hover:scale-105"
              >
                ☀️
              </button>
              <button
                id="darkBtn"
                class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-sm transition-all hover:scale-105"
              >
                🌙
              </button>
            </div>
          </div>

          <div class="w-full">
            <h3
              class="text-slate-700 dark:text-white text-sm font-semibold mb-3 transition-colors"
            >
              Weekly Forecast
            </h3>
            <div
              id="forecastStrip"
              class="flex gap-3 overflow-x-auto pb-2 scrollbar-thin"
            >
              <div
                class="theme-card shrink-0 flex flex-col items-center gap-3 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl px-5 py-4 min-w-[95px] animate-pulse transition-colors duration-300"
              >
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-10 h-3 rounded"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-4 rounded"
                ></div>
              </div>
              <div
                class="theme-card shrink-0 flex flex-col items-center gap-3 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl px-5 py-4 min-w-[95px] animate-pulse transition-colors duration-300"
              >
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-10 h-3 rounded"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-4 rounded"
                ></div>
              </div>
              <div
                class="theme-card shrink-0 flex flex-col items-center gap-3 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl px-5 py-4 min-w-[95px] animate-pulse transition-colors duration-300"
              >
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-10 h-3 rounded"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-4 rounded"
                ></div>
              </div>
              <div
                class="theme-card shrink-0 flex flex-col items-center gap-3 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl px-5 py-4 min-w-[95px] animate-pulse transition-colors duration-300"
              >
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-10 h-3 rounded"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-4 rounded"
                ></div>
              </div>
              <div
                class="theme-card shrink-0 flex flex-col items-center gap-3 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl px-5 py-4 min-w-[95px] animate-pulse transition-colors duration-300"
              >
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-10 h-3 rounded"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-4 rounded"
                ></div>
              </div>
              <div
                class="theme-card shrink-0 flex flex-col items-center gap-3 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl px-5 py-4 min-w-[95px] animate-pulse transition-colors duration-300"
              >
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-10 h-3 rounded"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-4 rounded"
                ></div>
              </div>
              <div
                class="theme-card shrink-0 flex flex-col items-center gap-3 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl px-5 py-4 min-w-[95px] animate-pulse transition-colors duration-300"
              >
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-8 rounded-full"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-10 h-3 rounded"
                ></div>
                <div
                  class="bg-slate-300 dark:bg-slate-700 w-8 h-4 rounded"
                ></div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div
              class="theme-card bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl p-5 flex flex-col justify-between min-h-[250px] transition-colors duration-300"
            >
              <div class="flex items-center justify-between mb-3">
                <p
                  class="text-slate-700 dark:text-white text-xs font-semibold transition-colors"
                >
                  Hourly Forecast
                </p>
              </div>
              <div class="relative h-[250px]">
                <div
                  id="chartSkeleton"
                  class="absolute inset-0 animate-pulse bg-slate-300/50 dark:bg-slate-700/30 rounded-xl z-10"
                ></div>
                <canvas id="hourlyChart" class="w-full h-full"></canvas>
              </div>
            </div>

            <div
              class="theme-card bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border rounded-2xl p-5 flex flex-col gap-3 max-h-[300px] overflow-y-auto transition-colors duration-300"
            >
              <div class="flex items-center justify-between mb-1">
                <p
                  class="theme-text text-slate-700 dark:text-white font-semibold text-sm transition-colors"
                >
                  Sunrise &amp; Sunset (Favourites)
                </p>
              </div>
              <div id="sunriseSunsetList" class="flex flex-col gap-3">
                <div
                  class="flex justify-between items-center bg-slate-100 dark:bg-dark-card2 p-3 rounded-xl animate-pulse transition-colors"
                >
                  <div
                    class="bg-slate-300 dark:bg-slate-700 h-4 w-20 rounded"
                  ></div>
                  <div
                    class="bg-slate-300 dark:bg-slate-700 h-4 w-28 rounded"
                  ></div>
                </div>
                <div
                  class="flex justify-between items-center bg-slate-100 dark:bg-dark-card2 p-3 rounded-xl animate-pulse transition-colors"
                >
                  <div
                    class="bg-slate-300 dark:bg-slate-700 h-4 w-16 rounded"
                  ></div>
                  <div
                    class="bg-slate-300 dark:bg-slate-700 h-4 w-28 rounded"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div
          id="rightPanel"
          class="w-full lg:w-80 shrink-0 flex flex-col border-t lg:border-t-0 lg:border-l border-slate-200 dark:border-dark-border bg-slate-100 dark:bg-dark-card2 overflow-y-auto p-4 md:p-0 transition-colors duration-300"
        >
          <div
            id="rightPanelHeader"
            class="flex items-center gap-3 p-4 border-b border-slate-200 dark:border-dark-border relative transition-colors"
          >
            <div
  id="searchBox"
  class="flex-1 flex items-center gap-2 bg-dark-card border border-dark-border hover:border-indigo-500 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500/30 rounded-xl px-3 py-2.5 transition-all duration-200"
>
  <svg
    class="w-4 h-4 text-dark-muted shrink-0"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
  >
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
  </svg>
  <input
    id="searchInput"
    type="text"
    placeholder="Search city..."
    class="bg-transparent text-sm text-white placeholder:text-dark-muted focus:outline-none flex-1 w-full tracking-wide"
  />
</div>

            <button
              id="geo-btn"
              title="Use My Location"
              class="text-slate-400 hover:text-blue-500 transition-colors cursor-pointer text-lg"
            >
              <i class="fa-solid fa-location-crosshairs"></i>
            </button>

            <div
              class="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-white font-bold text-xs shrink-0 overflow-hidden"
            >
              <img
                src="./assets/Moin.jpg"
                class="w-full h-full object-cover"
                onerror="
                  this.style.display = 'none';
                  this.parentElement.innerHTML = 'AS';
                "
              />
            </div>
          </div>

          <div
            id="mainWeatherCard"
            class="m-4 main-card-dark  rounded-2xl p-5 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border text-slate-800 dark:text-white relative overflow-hidden min-h-[320px] shadow-sm dark:shadow-card transition-all duration-300">

              <div class="deco-circle-1"></div>
  <div class="deco-circle-2"></div>

          
            <div id="weatherSkeleton" class="animate-pulse  flex flex-col gap-4">
              <div class="flex justify-between">
                <div
                  class="h-5 w-24 bg-slate-300 dark:bg-slate-700 rounded"
                ></div>
                <div
                  class="h-5 w-5 bg-slate-300 dark:bg-slate-700 rounded-full"
                ></div>
              </div>
              <div class="flex justify-center">
                <div
                  class="h-20 w-20 bg-slate-300 dark:bg-slate-700 rounded-full"
                ></div>
              </div>
              <div
                class="h-4 w-32 bg-slate-300 dark:bg-slate-700 rounded mx-auto"
              ></div>
              <div
                class="h-12 w-24 bg-slate-300 dark:bg-slate-700 rounded mx-auto"
              ></div>
              <div
                class="h-5 w-20 bg-slate-300 dark:bg-slate-700 rounded mx-auto"
              ></div>
            </div>

            <div
              id="weatherContent"
              class="hidden relative z-10  flex flex-col h-full"
            >
              <div class="flex items-center gap-2 mb-2">
                <button
                  title="Add to Favourites"
                  id="heartBtn"
                  class="text-slate-400 dark:text-white/65 hover:text-red-500 transition-colors text-lg"
                >
                  <i class="fa-regular fa-heart"></i>
                </button>
                <span id="cardCity" class="font-medium text-sm"></span>
              </div>

              <div id="weather-icon" class="flex justify-center my-3"></div>
              <p
                id="cardDate"
                class="text-slate-500 dark:text-white/75 text-xs text-center mb-3"
              ></p>
              <p
                id="cardTemp"
                class="font-display font-bold text-5xl md:text-6xl text-center"
              ></p>
              <p
                id="cardCondition"
                class="text-center text-lg md:text-xl font-semibold mb-5"
              ></p>

              <div
                class="flex flex-col items-center justify-center gap-3 text-sm text-slate-600 dark:text-slate-300"
              >
                <div class="flex items-center gap-3">
                  <span>💨 Wind</span>
                  <span
                    id="cardWind"
                    class="font-semibold text-slate-800 dark:text-white"
                  ></span>
                </div>
                <div class="flex items-center gap-3">
                  <span>💧 Hum</span>
                  <span
                    id="cardHumidity"
                    class="font-semibold text-slate-800 dark:text-white"
                  ></span>
                </div>
              </div>
            </div>
          </div>

          <div id="favCity" class="space-y-3">
            <div
              class="mx-4 mb-3 rounded-2xl p-4 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border animate-pulse transition-colors"
            >
              <div class="flex justify-between">
                <div>
                  <div
                    class="h-3 w-20 bg-slate-300 dark:bg-slate-700 rounded mb-2"
                  ></div>
                  <div
                    class="h-3 w-16 bg-slate-300 dark:bg-slate-700 rounded"
                  ></div>
                </div>
                <div
                  class="h-8 w-12 bg-slate-300 dark:bg-slate-700 rounded"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      id="toast-container"
      class="fixed top-5 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-3 w-80 pointer-events-none"
></div>
    </div>
  </body>
</html>
